name: Update IPTV Playlist and EPG

on:
  schedule:
    # Run every hour — public repos have unlimited free GitHub Actions minutes
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    permissions:
      # Required to write changes back to the repository
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Scraper
        run: |
          python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u epg.xml
          
          # Only commit and push if there are modified files staged
          if ! git diff --staged --quiet; then
            git commit -m "Update IPTV Playlist and EPG [skip ci]"
            git push
          else
            echo "No changes to playlist.m3u or epg.xml detected."
          fi
